name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode release keystore
        run: echo "${{ secrets.KHATABOOK_KEYSTORE_BASE64 }}" | base64 --decode > android/khatabook-release.keystore

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KHATABOOK_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KHATABOOK_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=khatabook" >> android/key.properties
          echo "storeFile=../khatabook-release.keystore" >> android/key.properties

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: khatabook-whatsapp-apk
          path: build/app/outputs/flutter-apk/app-release.apk
